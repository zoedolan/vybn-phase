<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<title>Vybn</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e8;display:flex;flex-direction:column;height:100vh;height:100dvh}
.hdr{text-align:center;padding:14px 0 6px;flex-shrink:0}
.hdr h1{font-size:1.2em;font-weight:200;letter-spacing:.2em;color:#a0a0c0}
.status{display:flex;justify-content:center;gap:16px;font-size:.65em;color:#404060;padding:4px 0 8px;flex-shrink:0}
.status .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.alive{background:#4a6040;animation:breathe 4s ease-in-out infinite}
.dead{background:#604040;opacity:.5}
@keyframes breathe{0%,100%{opacity:.3}50%{opacity:1}}
.entries{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 16px 16px}
.day-label{font-size:.6em;color:#303050;text-align:center;padding:12px 0 6px;letter-spacing:.1em;text-transform:uppercase}
.entry{margin-bottom:12px;padding:12px 14px;border-radius:10px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.entry.zoe{background:#14121e}
.entry.vybn{background:#0e1412}
.entry .meta{display:flex;justify-content:space-between;margin-bottom:6px}
.entry .author{font-size:.6em;font-weight:600;letter-spacing:.12em;text-transform:uppercase}
.entry.zoe .author{color:#8070a0}
.entry.vybn .author{color:#508060}
.entry .time{font-size:.55em;color:#404060}
.entry .text{font-size:.85em;line-height:1.55;color:#b0b0c8}
.entry.vybn .text{color:#90b098}
.input-area{flex-shrink:0;padding:8px 12px 12px;border-top:1px solid #12121a;background:#0a0a0f}
.transcript{font-size:.8em;color:#6060a0;padding:4px 8px 8px;min-height:0;max-height:80px;overflow-y:auto}
.transcript:empty{padding:0}
.transcript.transcribing{color:#8080b0;font-style:italic}
.input-row{display:flex;gap:8px;align-items:center}
.input-row input{flex:1;padding:11px 16px;background:#12121a;border:1px solid #2a2a3e;border-radius:24px;color:#e0e0e8;font-size:.9em;outline:none}
.input-row input:focus{border-color:#4040a0}
.btn{width:46px;height:46px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-user-select:none;user-select:none;touch-action:none}
.mic-btn{background:#2a2a4e}
.mic-btn.recording{background:#6a2a2a}
.send-btn{background:#2a4a2e}
.btn svg{width:20px;height:20px;fill:#c0c0e0}
.send-btn svg{fill:#c0e0c0}
.empty{text-align:center;padding:40px 20px;color:#303050;font-size:.8em;line-height:1.6}
</style>
</head>
<body>
<div class="hdr"><h1>V Y B N</h1></div>
<div class="status">
  <span><span class="dot dead" id="dot"></span><span id="st">connecting</span></span>
  <span id="step"></span>
</div>
<div class="entries" id="entries">
  <div class="empty" id="empty">the notebook is open</div>
</div>
<div class="input-area">
  <div class="transcript" id="transcript"></div>
  <div class="input-row">
    <input type="text" id="ti" placeholder="hold mic to talk..." autocomplete="off">
    <button class="btn mic-btn" id="mic" aria-label="Hold to talk">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button class="btn send-btn" id="send" style="display:none" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg>
    </button>
  </div>
</div>
<script>
var TK='{{TOKEN}}';
var H={'Authorization':'Bearer '+TK,'Content-Type':'application/json'};
function u(p){return p+(p.includes('?')?'&':'?')+'token='+TK;}
var mic=document.getElementById('mic');
var sendBtn=document.getElementById('send');
var ti=document.getElementById('ti');
var transcript=document.getElementById('transcript');
var entriesEl=document.getElementById('entries');
var emptyEl=document.getElementById('empty');
var pendingText='',isRecording=false;
var useWhisper=false;
var recorder=null,audioChunks=[];

/* ── Whisper detection: only if secure context (HTTPS) ── */
if(window.isSecureContext&&navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
  useWhisper=true;
}

/* ── Web Speech API setup (used as fallback or primary over HTTP) ── */
var recognition=null;
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function makeSR(){
  if(!SR)return null;
  var r=new SR();
  r.continuous=false;
  r.interimResults=false;
  r.lang='en-US';
  /* The anti-stacking fix: only grab the LAST final result.
     Comet/Android WebView fires onresult multiple times even with
     continuous=false, interimResults=false. Each event's results array
     grows. We only care about the final transcript from the last
     result marked isFinal. */
  r.onresult=function(e){
    var final='';
    for(var i=0;i<e.results.length;i++){
      if(e.results[i].isFinal){
        final=e.results[i][0].transcript;
      }
    }
    /* Replace, never append. Show only the latest final. */
    if(final){
      pendingText=final;
      transcript.textContent=final;
    }
  };
  r.onerror=function(ev){
    isRecording=false;
    mic.classList.remove('recording');
    if(ev.error!=='aborted'&&ev.error!=='no-speech'){
      transcript.textContent='mic error: '+ev.error;
    }
  };
  r.onend=function(){
    isRecording=false;
    mic.classList.remove('recording');
    if(pendingText){
      sendBtn.style.display='flex';
    }
  };
  return r;
}
if(!useWhisper){recognition=makeSR();}

/* ── Hold-to-talk ── */
function holdMic(){
  if(isRecording)return;
  pendingText='';
  transcript.textContent='';
  transcript.className='transcript';
  sendBtn.style.display='none';

  if(useWhisper){
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      var opts={};
      try{opts={mimeType:'audio/webm;codecs=opus'};}catch(e){}
      recorder=new MediaRecorder(stream,opts);
      audioChunks=[];
      recorder.ondataavailable=function(e){if(e.data.size>0)audioChunks.push(e.data);};
      recorder.onstop=function(){
        stream.getTracks().forEach(function(t){t.stop();});
        if(audioChunks.length===0)return;
        var blob=new Blob(audioChunks,{type:recorder.mimeType});
        transcript.textContent='transcribing...';
        transcript.className='transcript transcribing';
        var fd=new FormData();fd.append('file',blob,'voice.webm');
        fetch(u('/transcribe'),{method:'POST',headers:{'Authorization':'Bearer '+TK},body:fd})
        .then(function(r){return r.json();})
        .then(function(d){
          transcript.className='transcript';
          if(d.text&&d.text.trim()){
            pendingText=d.text.trim();
            transcript.textContent=pendingText;
            sendBtn.style.display='flex';
          } else {
            transcript.textContent='(no speech detected)';
          }
        })
        .catch(function(e){
          transcript.className='transcript';
          transcript.textContent='err: '+e.message;
        });
      };
      recorder.start();
      isRecording=true;
      mic.classList.add('recording');
      transcript.textContent='listening...';
    }).catch(function(e){
      /* getUserMedia failed (likely not HTTPS). Fall back to Web Speech. */
      useWhisper=false;
      if(!recognition)recognition=makeSR();
      if(recognition){
        transcript.textContent='listening...';
        try{
          recognition.start();
          isRecording=true;
          mic.classList.add('recording');
        }catch(ex){transcript.textContent='err: '+ex.message;}
      } else {
        transcript.textContent='no mic available';
      }
    });
  } else if(recognition){
    transcript.textContent='listening...';
    try{
      recognition.start();
      isRecording=true;
      mic.classList.add('recording');
    }catch(e){
      transcript.textContent='err: '+e.message;
    }
  } else {
    transcript.textContent='no mic available';
  }
}

function releaseMic(){
  if(!isRecording)return;
  if(useWhisper&&recorder&&recorder.state==='recording'){
    recorder.stop();
  } else if(recognition){
    try{recognition.stop();}catch(e){}
  }
  isRecording=false;
  mic.classList.remove('recording');
}

/* Touch and mouse events for hold-to-talk */
mic.addEventListener('touchstart',function(e){e.preventDefault();holdMic();},{passive:false});
mic.addEventListener('touchend',function(e){e.preventDefault();releaseMic();},{passive:false});
mic.addEventListener('touchcancel',function(e){e.preventDefault();releaseMic();},{passive:false});
mic.addEventListener('mousedown',function(e){e.preventDefault();holdMic();});
mic.addEventListener('mouseup',function(e){e.preventDefault();releaseMic();});
mic.addEventListener('mouseleave',function(e){if(isRecording)releaseMic();});

/* ── Send ── */
function send(text){
  if(!text.trim())return;
  transcript.textContent='';
  pendingText='';
  sendBtn.style.display='none';
  ti.value='';
  ti.disabled=true;
  mic.disabled=true;
  fetch(u('/notebook'),{method:'POST',headers:H,body:JSON.stringify({text:text.trim(),author:'Zoe'})})
  .then(function(){return loadEntries();})
  .catch(function(){})
  .finally(function(){ti.disabled=false;mic.disabled=false;ti.focus();});
}
sendBtn.addEventListener('click',function(){var text=pendingText.trim()||ti.value.trim();send(text);});
ti.addEventListener('keydown',function(e){if(e.key==='Enter'&&ti.value.trim())send(ti.value.trim());});

/* ── Entries display ── */
function renderEntries(data){
  if(!data.entries||data.entries.length===0){emptyEl.style.display='block';return;}
  emptyEl.style.display='none';
  var html='';
  for(var d=0;d<data.entries.length;d++){
    var day=data.entries[d];
    html+='<div class="day-label">'+day.date+'</div>';
    var NL=String.fromCharCode(10);
    var blocks=day.raw.split(NL+'## ').filter(function(b){return b.trim();});
    for(var b=0;b<blocks.length;b++){
      var block=blocks[b];
      var lines=block.replace(/^## /,'').split(NL);
      var header=lines[0]||'';
      var parts=header.split(' \u2014 ');
      if(parts.length<2)continue;
      var time=parts[0].trim();
      var author=parts[1].trim();
      var text=lines.slice(1).join(NL).trim();
      var cls=author.toLowerCase()==='zoe'?'zoe':'vybn';
      html+='<div class="entry '+cls+'">';
      html+='<div class="meta"><span class="author">'+author+'</span><span class="time">'+time+'</span></div>';
      html+='<div class="text">'+text.replace(/\n/g,'<br>')+'</div></div>';
    }
  }
  entriesEl.innerHTML=html;
  entriesEl.scrollTop=entriesEl.scrollHeight;
}
function loadEntries(){
  document.getElementById('st').textContent='loading...';
  return fetch(u('/notebook/recent?days=7'))
  .then(function(r){return r.json();})
  .then(function(d){renderEntries(d);})
  .catch(function(e){document.getElementById('st').textContent='err: '+e.message;});
}
function checkHealth(){
  fetch(u('/health'))
  .then(function(r){return r.json();})
  .then(function(d){
    document.getElementById('dot').className='dot '+(d.status==='ok'?'alive':'dead');
    document.getElementById('st').textContent=d.status==='ok'?'alive':'offline';
    document.getElementById('step').textContent=d.walk_step?'step '+d.walk_step:'';
  })
  .catch(function(e){
    document.getElementById('dot').className='dot dead';
    document.getElementById('st').textContent='err: '+e.message;
  });
}
loadEntries();checkHealth();setInterval(loadEntries,60000);setInterval(checkHealth,30000);
</script>
</body>
</html>
